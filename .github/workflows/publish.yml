name: Build plugin

on:
  push:
    tags:
      - '*'

env:
  PLUGIN_NAME: logseq-claude-code-wsl

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Build
        id: build
        run: |
          npm ci
          npm run build
          mkdir ${{ env.PLUGIN_NAME }}
          cp README.md LICENSE package.json manifest.json icon.svg \
             launcher.cmd launcher.ps1 setup.reg uninstall.reg \
             screenshot1.png screenshot2.png ${{ env.PLUGIN_NAME }}/
          mv dist ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}
          ls
          echo "tag_name=$(git tag --sort version:refname | tail -n 1)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref }}
        with:
          allowUpdates: true
          draft: false
          prerelease: false
          artifacts: "./${{ env.PLUGIN_NAME }}.zip,./package.json"
